<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concentration</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
      margin: 0;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(8px, 2vw, 12px);
      width: 100%;
      max-width: min(90vw, 400px);
      padding: 0 10px;
      position: relative;
      background: linear-gradient(135deg, #2a2a4a 0%, #1a1a3a 50%, #2a2a4a 100%);
      background-size: 200% 200%;
      border-radius: 8px;
      padding: clamp(8px, 2vw, 12px);
    }

    .card-wrapper {
      position: relative;
      aspect-ratio: 1;
    }

    .card {
      aspect-ratio: 1;
      background: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      font-size: clamp(20px, 5vw, 24px);
      touch-action: manipulation;
      transition: transform 0.2s ease;
      padding: 8px;
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
    }

    .card-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #333;
      z-index: 1;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .card-overlay.revealed {
      opacity: 0;
    }

    .card:active {
      transform: scale(0.95);
    }

    .card.flipped {
      background: #eee;
      color: #111;
      transform: scale(1);
      animation: flip 0.3s ease;
    }

    @keyframes flip {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
      100% { transform: scaleY(1); }
    }

    #moves, #timer, #best {
      margin-top: clamp(8px, 2vh, 12px);
      font-size: clamp(14px, 3.5vw, 16px);
    }

    #best {
      color: #888;
      font-size: clamp(12px, 3vw, 14px);
    }

    #restart {
      background: #333;
      border: 1px solid #555;
      color: #aaa;
      font-size: clamp(12px, 3vw, 14px);
      padding: clamp(6px, 1.5vw, 8px) clamp(12px, 3vw, 16px);
      margin-top: clamp(12px, 2vh, 20px);
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid" id="grid"></div>
    <div id="moves" style="text-align: center;">Moves: 0</div>
    <div id="timer" style="text-align: center;">Time: 0s</div>
    <div id="best" style="text-align: center;"></div>
    <button id="restart" style="cursor: pointer;">Restart</button>
  </div>

  <script>
    const symbols = ['🍒','🍋','⭐','🎵','🍒','🍋','⭐','🎵'];
    const grid = document.getElementById('grid');
    const movesDisplay = document.getElementById('moves');
    const timerDisplay = document.getElementById('timer');
    const bestDisplay = document.getElementById('best');
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let timerInterval = null;
    let seconds = 0;
    let gameStarted = false;
    let isProcessing = false;

    function loadBest() {
      const best = localStorage.getItem('concentrationBest');
      if (best) {
        const data = JSON.parse(best);
        bestDisplay.textContent = `Best: ${data.moves} moves in ${data.seconds}s`;
      }
    }

    function saveBest() {
      const best = localStorage.getItem('concentrationBest');
      if (!best || moves < JSON.parse(best).moves || (moves === JSON.parse(best).moves && seconds < JSON.parse(best).seconds)) {
        localStorage.setItem('concentrationBest', JSON.stringify({ moves, seconds }));
        loadBest();
      }
    }

    function startTimer() {
      if (!gameStarted) {
        gameStarted = true;
        seconds = 0;
        timerInterval = setInterval(() => {
          seconds++;
          timerDisplay.textContent = 'Time: ' + seconds + 's';
        }, 1000);
      }
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function initGame() {
      grid.innerHTML = '';
      flippedCards = [];
      matchedPairs = 0;
      moves = 0;
      seconds = 0;
      gameStarted = false;
      isProcessing = false;
      movesDisplay.textContent = 'Moves: 0';
      timerDisplay.textContent = 'Time: 0s';
      stopTimer();
      loadBest();
      const shuffled = symbols.sort(() => Math.random() - 0.5);
      shuffled.forEach((symbol, index) => {
        const cardWrapper = document.createElement('div');
        cardWrapper.className = 'card-wrapper';
        
        const overlay = document.createElement('div');
        overlay.className = 'card-overlay';
        overlay.dataset.symbol = symbol;
        
        const card = document.createElement('div');
        card.className = 'card';
        card.textContent = '';
        card.dataset.symbol = symbol;
        card.onclick = () => {
          if (isProcessing || card.classList.contains('flipped') || flippedCards.length === 2) return;
          startTimer();
          card.classList.add('flipped');
          card.textContent = symbol;
          flippedCards.push({ card, overlay });
          if (flippedCards.length === 2) {
            isProcessing = true;
            moves++;
            movesDisplay.textContent = 'Moves: ' + moves;
            if (flippedCards[0].card.dataset.symbol === flippedCards[1].card.dataset.symbol) {
              matchedPairs++;
              flippedCards[0].overlay.classList.add('revealed');
              flippedCards[1].overlay.classList.add('revealed');
              flippedCards = [];
              isProcessing = false;
              if (matchedPairs === 4) {
                stopTimer();
                saveBest();
                setTimeout(() => alert('You won!'), 100);
              }
            } else {
              setTimeout(() => {
                flippedCards.forEach(f => {
                  f.card.classList.remove('flipped');
                  f.card.textContent = '';
                });
                flippedCards = [];
                isProcessing = false;
              }, 1000);
            }
          }
        };
        
        cardWrapper.appendChild(overlay);
        cardWrapper.appendChild(card);
        grid.appendChild(cardWrapper);
      });
    }

    initGame();
    document.getElementById('restart').onclick = initGame;
  </script>
</body>
</html>
